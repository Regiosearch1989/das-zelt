<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAS ZELT – Exklusive Einladung 2025</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{serif:['Playfair Display','Georgia','serif'],sans:['Inter','system-ui','sans-serif']}}}}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      background:#FDFAF5;
      color:#1A1510;
      font-family:'Inter',system-ui,sans-serif;
      overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
    }
    .font-serif{font-family:'Playfair Display',Georgia,serif}

    /* ── GOLD SHIMMER (hero / dark bg) ── */
    .gold-shimmer{
      background:linear-gradient(90deg,#9e7c1f 0%,#d4a843 25%,#f0cc6e 50%,#d4a843 75%,#9e7c1f 100%);
      background-size:200% auto;
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      animation:shimmerText 4s linear infinite;
    }
    /* ── GOLD SHIMMER (light bg – darker range) ── */
    .gold-shimmer-dark{
      background:linear-gradient(90deg,#7A5E10 0%,#B8890C 30%,#D4A843 50%,#B8890C 70%,#7A5E10 100%);
      background-size:200% auto;
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      animation:shimmerText 4s linear infinite;
    }
    @keyframes shimmerText{to{background-position:200% center}}

    /* ── SNOWFALL ── */
    @keyframes snowfall{
      0%  {transform:translateY(-20px) translateX(0)  rotate(0deg);  opacity:0}
      8%  {opacity:.9}
      92% {opacity:.6}
      100%{transform:translateY(105vh) translateX(22px) rotate(540deg);opacity:0}
    }
    /* ── AURORA ── */
    @keyframes aurora{
      0%,100%{opacity:.25;transform:scaleX(1)   scaleY(1)  }
      50%    {opacity:.5; transform:scaleX(1.12) scaleY(1.18)}
    }
    /* ── TWINKLE ── */
    @keyframes twinkle{
      0%,100%{opacity:.2;transform:scale(1)  }
      50%    {opacity:1; transform:scale(1.5)}
    }
    /* ── PULSE ── */
    @keyframes pulse{
      0%,100%{box-shadow:0 0 0 0   rgba(74,222,128,.45)}
      50%    {box-shadow:0 0 0 7px rgba(74,222,128,0)  }
    }
    /* ── SCROLL BOUNCE ── */
    @keyframes scrollBounce{
      0%,100%{transform:translateX(-50%) translateY(0) }
      50%    {transform:translateX(-50%) translateY(8px)}
    }
    /* ── FADE UP ── */
    @keyframes fadeUp{
      from{opacity:0;transform:translateY(22px)}
      to  {opacity:1;transform:translateY(0)   }
    }
    .fade-up-0{animation:fadeUp .7s ease-out .1s  both}
    .fade-up-1{animation:fadeUp .7s ease-out .28s both}
    .fade-up-2{animation:fadeUp .7s ease-out .46s both}
    .fade-up-3{animation:fadeUp .7s ease-out .64s both}
    .fade-up-4{animation:fadeUp .7s ease-out .82s both}
    .fade-up-5{animation:fadeUp .7s ease-out 1.0s both}

    /* ── STEP ENTER ── */
    @keyframes stepEnter{
      from{opacity:0;transform:translateX(30px) scale(.99)}
      to  {opacity:1;transform:translateX(0)    scale(1)  }
    }
    .step-enter{animation:stepEnter .42s cubic-bezier(.4,0,.2,1) forwards}

    /* ── CARD STAGGER ── */
    .cs-0{animation:fadeUp .5s ease-out .04s both}
    .cs-1{animation:fadeUp .5s ease-out .11s both}
    .cs-2{animation:fadeUp .5s ease-out .18s both}
    .cs-3{animation:fadeUp .5s ease-out .25s both}
    .cs-4{animation:fadeUp .5s ease-out .32s both}

    /* ── RING PULSE ── */
    @keyframes ringPulse{
      0%  {transform:scale(1);  opacity:.5}
      100%{transform:scale(2.2);opacity:0 }
    }
    /* ── TICKER ── */
    @keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

    /* ── PROGRESS GLOW ── */
    @keyframes progressGlow{
      0%,100%{background-position:200% 0;box-shadow:0 0 8px rgba(196,144,32,.4)}
      50%    {background-position:0%   0;box-shadow:0 0 18px rgba(196,144,32,.6)}
    }

    /* ─────────────────────────────────────
       LIGHT-THEME COMPONENTS
    ───────────────────────────────────── */

    /* Section backgrounds */
    .bg-light  {background:#FDFAF5}
    .bg-cream  {background:#F3EDE0}
    .bg-cream2 {background:#EDE6D5}

    /* Card – light */
    .card-light{
      background:#FFFFFF;
      border:1px solid rgba(30,20,10,.07);
      border-radius:18px;
      box-shadow:0 3px 18px rgba(30,20,10,.07);
      transition:all .3s ease;
      position:relative;
      overflow:hidden;
    }
    .card-light:hover{
      transform:translateY(-4px);
      box-shadow:0 14px 44px rgba(30,20,10,.11),0 0 0 1px rgba(196,144,32,.15);
      border-color:rgba(196,144,32,.25);
    }

    /* City card */
    .city-card{
      background:#FFFFFF;
      border:1px solid rgba(30,20,10,.07);
      border-radius:12px;
      padding:14px 16px;
      box-shadow:0 2px 10px rgba(30,20,10,.05);
      transition:all .25s ease;
    }
    .city-card:hover{
      background:#FDF8F0;
      border-color:rgba(196,144,32,.3);
      transform:translateY(-2px);
      box-shadow:0 6px 20px rgba(30,20,10,.09);
    }

    /* Gold badge */
    .gold-badge{
      display:inline-block;
      font-size:.68rem; letter-spacing:.28em; text-transform:uppercase;
      color:#9E6E05;
      padding:5px 18px;
      border:1px solid rgba(158,110,5,.28);
      border-radius:100px;
      background:rgba(158,110,5,.07);
      margin-bottom:1.2rem;
    }

    /* Gold button */
    .btn-gold{
      background:linear-gradient(135deg,#c49020 0%,#d4a843 40%,#f0cc6e 60%,#d4a843 80%,#c49020 100%);
      background-size:200% 200%;
      color:#07080e;
      font-weight:600;
      border:none; cursor:pointer;
      transition:all .3s cubic-bezier(.4,0,.2,1);
      position:relative; overflow:hidden;
      letter-spacing:.04em;
      text-decoration:none;
      display:inline-block;
    }
    .btn-gold::after{
      content:'';position:absolute;top:0;left:-100%;
      width:60%;height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);
      transform:skewX(-20deg);transition:left .5s ease;
    }
    .btn-gold:hover{background-position:100% 0;transform:translateY(-2px);box-shadow:0 12px 36px rgba(196,144,32,.38)}
    .btn-gold:hover::after{left:140%}
    .btn-gold:active{transform:translateY(0) scale(.98)}
    .btn-gold:disabled{opacity:.6;cursor:not-allowed;transform:none}

    /* Outline button – light bg */
    .btn-outline-dark{
      background:transparent;
      color:#9E6E05;
      font-weight:500;
      border:1.5px solid rgba(158,110,5,.4);
      cursor:pointer;
      transition:all .25s ease;
      letter-spacing:.04em;
      text-decoration:none;
      display:inline-block;
    }
    .btn-outline-dark:hover{background:rgba(158,110,5,.07);border-color:#B8890C;color:#B8890C}

    /* Outline button – dark bg (funnel) */
    .btn-outline-light{
      background:transparent;color:rgba(212,168,67,.9);
      font-weight:500;border:1px solid rgba(212,168,67,.35);
      cursor:pointer;transition:all .25s ease;letter-spacing:.04em;
    }
    .btn-outline-light:hover{background:rgba(212,168,67,.08);border-color:rgba(212,168,67,.6);color:#d4a843}

    /* ── INPUT (light) ── */
    .premium-input-light{
      background:#FFFFFF;
      border:1.5px solid rgba(30,20,10,.14);
      color:#1A1510;
      transition:all .2s ease;outline:none;
      font-family:'Inter',system-ui,sans-serif;
      font-size:.9rem;
    }
    .premium-input-light:focus{
      border-color:#B8890C;
      background:#FFFDF8;
      box-shadow:0 0 0 3px rgba(184,137,12,.12);
    }
    .premium-input-light::placeholder{color:rgba(30,20,10,.35)}
    .premium-input-light.error{border-color:rgba(220,38,38,.65)}

    /* ── INPUT (dark – funnel) ── */
    .premium-input{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.1);
      color:#fff;transition:all .2s ease;outline:none;
      font-family:'Inter',system-ui,sans-serif;font-size:.9rem;
    }
    .premium-input:focus{border-color:rgba(212,168,67,.7);background:rgba(212,168,67,.05);box-shadow:0 0 0 3px rgba(212,168,67,.1)}
    .premium-input::placeholder{color:rgba(255,255,255,.3)}
    .premium-input.error{border-color:rgba(239,68,68,.7)}

    /* ── CHECKBOX ── */
    .premium-checkbox{

      width:18px;height:18px;
      border:1.5px solid rgba(184,137,12,.5);
      border-radius:4px;background:rgba(255,255,255,.04);
      cursor:pointer;position:relative;flex-shrink:0;transition:all .2s ease;
    }
    .premium-checkbox:checked{background:#d4a843;border-color:#d4a843}
    .premium-checkbox:checked::after{
      content:'';position:absolute;top:2px;left:5px;
      width:6px;height:9px;
      border:2px solid #07080e;border-top:none;border-left:none;
      transform:rotate(45deg);
    }
    /* Light bg checkbox */
    .premium-checkbox-light{
      appearance:none;-webkit-appearance:none;
      width:18px;height:18px;
      border:1.5px solid rgba(158,110,5,.45);
      border-radius:4px;background:#FFFFFF;
      cursor:pointer;position:relative;flex-shrink:0;transition:all .2s ease;
    }
    .premium-checkbox-light:checked{background:#B8890C;border-color:#B8890C}
    .premium-checkbox-light:checked::after{
      content:'';position:absolute;top:2px;left:5px;
      width:6px;height:9px;
      border:2px solid #FFFFFF;border-top:none;border-left:none;
      transform:rotate(45deg);
    }

    /* ── ANSWER CARD (funnel dark) ── */
    .answer-card{
      background:rgba(255,255,255,.04);backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,.08);border-radius:16px;

      -webkit-tap-highlight-color:transparent;
    }
    .answer-card:hover{background:rgba(212,168,67,.07);border-color:rgba(212,168,67,.45);transform:translateY(-2px) scale(1.01);box-shadow:0 8px 32px rgba(212,168,67,.12)}
    .answer-card:active{transform:scale(.98)}
    .answer-card.selected{background:rgba(212,168,67,.1);border-color:rgba(212,168,67,.7);box-shadow:0 8px 40px rgba(212,168,67,.18),0 0 0 1px rgba(212,168,67,.3);transform:scale(1.01)}

    /* ── PROGRESS BAR ── */
    .progress-fill{
      background:linear-gradient(90deg,#9e7c1f,#d4a843,#f0cc6e,#d4a843);
      background-size:200% 100%;
      animation:progressGlow 2.5s ease-in-out infinite;
      transition:width .55s cubic-bezier(.4,0,.2,1);
      border-radius:2px;
    }

    /* ── STICKY HEADER ── */
    .sticky-header{
      position:fixed;top:0;left:0;right:0;z-index:100;
      transition:all .3s ease;
    }
    .sticky-header.scrolled{
      background:rgba(253,250,245,.95);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(30,20,10,.09);
      box-shadow:0 2px 20px rgba(30,20,10,.06);
    }

    /* ── SECTION DIVIDER ── */
    .section-divider{
      width:100%;height:1px;
      background:linear-gradient(90deg,transparent,rgba(30,20,10,.1),transparent);
    }

    /* ── BENTO GRID MOBILE ── */
    @media(max-width:640px){
      .bento-grid{
        grid-template-columns:1fr 1fr !important;
        grid-template-rows:auto !important;
      }
      .bento-grid > *{
        grid-column:auto !important;
        grid-row:auto !important;
      }
    }

    /* ── FEATURE CARD TOP LINE ── */
    .card-top-line::before{
      content:'';position:absolute;top:0;left:0;right:0;height:2px;
    }

    /* ── TICKER ── */
    .ticker-wrap{overflow:hidden;width:100%}
    .ticker-inner{display:flex;width:max-content;animation:ticker 28s linear infinite}
    .ticker-inner:hover{animation-play-state:paused}

    /* ── STICKY CTA ── */
    .sticky-cta{
      position:fixed;bottom:28px;right:28px;z-index:99;
      transition:all .35s cubic-bezier(.4,0,.2,1);
    }
    @media(max-width:640px){
      .sticky-cta{bottom:0;right:0;left:0;border-radius:0!important;border-top:1px solid rgba(196,144,32,.25)}
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:#FDFAF5}
    ::-webkit-scrollbar-thumb{background:rgba(158,110,5,.3);border-radius:2px}

    /* ── GLASS CARD (dark / funnel) ── */
    .glass-card{
      background:rgba(255,255,255,.04);
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,.08);border-radius:16px;
    }

    /* Investment section bg */
    .invest-bg{
      background:
        radial-gradient(ellipse 90% 70% at 50% 50%,rgba(12,22,65,.92) 0%,rgba(8,9,18,.97) 100%);
    }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ══════════════════════════════════
   HOOKS
══════════════════════════════════ */
function useInView(t=0.1){
  const ref=useRef(); const [v,setV]=useState(false);
  useEffect(()=>{
    const el=ref.current; if(!el)return;
    const o=new IntersectionObserver(([e])=>{if(e.isIntersecting){setV(true);o.disconnect();}},{threshold:t});
    o.observe(el); return()=>o.disconnect();
  },[]);
  return [ref,v];
}
function useCounter(target,inView,dur=1800){
  const [n,setN]=useState(0);
  useEffect(()=>{
    if(!inView)return;
    let s=0; const step=target/(dur/16);
    const t=setInterval(()=>{s+=step;if(s>=target){setN(target);clearInterval(t);}else setN(Math.floor(s));},16);
    return()=>clearInterval(t);
  },[inView,target]);
  return n;
}
function useScrolled(thresh=80){
  const [v,setV]=useState(false);
  useEffect(()=>{
    const h=()=>setV(window.scrollY>thresh);
    window.addEventListener('scroll',h,{passive:true});
    return()=>window.removeEventListener('scroll',h);
  },[thresh]);
  return v;
}

/* ══════════════════════════════════
   DATA MODEL
══════════════════════════════════ */
const INIT={
  lead_type:'',has_visited:'',private_interest:'',investment_interest:'',
  priority:'',company_interest:'',company_goal:'',
  first_name:'',last_name:'',company_name:'',email:'',phone:'',
  tags:[],route_goal:'',submitted_at:null,source:'daszelt_funnel_2025',
};
const S={
  Q1:'q1_type',Q2:'q2_visited',
  PA:'pa_interest',PB:'pb_invest',PC:'pc_priority',PF:'p_form',
  CA:'ca_interest',CB:'cb_goal',CF:'c_form',
};
const PROG={q1_type:1,q2_visited:2,pa_interest:3,pb_invest:4,pc_priority:5,p_form:6,ca_interest:3,cb_goal:4,c_form:5};

function computeTags(d){
  const t=[];
  if(d.lead_type==='private'){
    t.push('private_lead');
    if(d.has_visited==='yes') t.push('returning_visitor');
    if(d.has_visited==='no')  t.push('new_visitor');
    if(d.investment_interest==='ja_infos')      t.push('private_invest_interest');
    if(d.investment_interest==='vielleicht')    t.push('private_invest_warm');
    if(d.investment_interest==='newsletter_only')t.push('private_newsletter');
    if(d.private_interest==='unterstuetzen')    t.push('private_supporter');
    if(d.priority==='investment')               t.push('high_intent_invest');
  }
  if(d.lead_type==='company'){
    t.push('company_lead');
    if(d.has_visited==='yes')                   t.push('returning_company');
    if(d.company_interest==='marketingpakete')  t.push('company_marketing');
    if(d.company_interest==='weihnachtsessen')  t.push('company_weihnachtsessen');
    if(d.company_interest==='firmenanlaesse')   t.push('company_firmenevent');
    if(d.company_interest==='sideevents')       t.push('company_sideevents');
    if(d.company_interest==='crowdfunding')     t.push('company_crowdinvesting');
    if(d.company_goal==='investment')           t.push('company_invest_interest');
  }
  return t;
}
async function submitLead(raw){
  const p={...raw,tags:computeTags(raw),route_goal:raw.lead_type==='private'?'private_campaign':'company_campaign',submitted_at:new Date().toISOString()};
  console.log('%c📋 DAS ZELT Lead','color:#d4a843;font-weight:bold',p);
  // await fetch('YOUR_WEBHOOK_URL',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});
  return p;
}

/* ══════════════════════════════════
   SHARED UI
══════════════════════════════════ */
function AnimateIn({children,delay=0,style={}}){
  const [ref,v]=useInView();
  return(
    <div ref={ref} style={{opacity:v?1:0,transform:v?'translateY(0)':'translateY(22px)',transition:`opacity .7s ease ${delay}ms,transform .7s ease ${delay}ms`,...style}}>
      {children}
    </div>
  );
}

/* ══════════════════════════════════
   BACKGROUND (hero only)
══════════════════════════════════ */
function SnowHero({count=30}){
  const f=useMemo(()=>Array.from({length:count},(_,i)=>({
    id:i,left:Math.random()*100,size:Math.random()*10+6,
    dur:(Math.random()*9+8).toFixed(1),del:(Math.random()*12).toFixed(1),
    op:(Math.random()*.45+.25).toFixed(2),
  })),[]);
  return(
    <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none',zIndex:2}}>
      {f.map(s=>(
        <div key={s.id} style={{position:'absolute',left:`${s.left}%`,top:'-20px',fontSize:`${s.size}px`,opacity:s.op,userSelect:'none',color:'rgba(230,240,255,0.9)',animation:`snowfall ${s.dur}s linear ${s.del}s infinite`}}>❄</div>
      ))}
    </div>
  );
}

function StarsHero(){
  const s=useMemo(()=>Array.from({length:80},(_,i)=>({
    id:i,l:Math.random()*100,t:Math.random()*100,
    sz:Math.random()*2+.4,dur:(Math.random()*3+2).toFixed(1),
    del:(Math.random()*4).toFixed(1),gold:Math.random()>.8,
  })),[]);
  return(
    <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none',zIndex:1}}>
      {s.map(x=>(
        <div key={x.id} style={{
          position:'absolute',left:`${x.l}%`,top:`${x.t}%`,
          width:`${x.sz}px`,height:`${x.sz}px`,borderRadius:'50%',
          background:x.gold?'rgba(240,200,100,0.9)':'rgba(255,255,255,0.85)',
          boxShadow:x.gold?`0 0 ${x.sz*3}px rgba(240,200,100,0.5)`:'none',
          animation:`twinkle ${x.dur}s ease-in-out ${x.del}s infinite`,
        }}/>
      ))}
    </div>
  );
}

/* ══════════════════════════════════
   STICKY HEADER
══════════════════════════════════ */
function StickyHeader({onCTA}){
  const scrolled=useScrolled(90);
  return(
    <header className={`sticky-header ${scrolled?'scrolled':''}`} style={{padding:'14px 28px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <div className="font-serif" style={{fontSize:'1.25rem',fontWeight:700,letterSpacing:'-.01em',color:scrolled?'#1A1510':'#FFFFFF',transition:'color .3s',textShadow:scrolled?'none':'0 1px 8px rgba(0,0,0,0.4)'}}>
        DAS ZELT
      </div>
      <button onClick={onCTA} className="btn-gold" style={{padding:'8px 22px',borderRadius:'100px',fontSize:'.8rem'}}>
        Jetzt mitmachen →
      </button>
    </header>
  );
}

/* ══════════════════════════════════
   HERO SECTION — VIDEO BG
══════════════════════════════════ */
function HeroSection({onCTA}){
  return(
    <div style={{position:'relative',minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',overflow:'hidden'}}>

      {/* ── VIDEO BACKGROUND ── */}
      <video autoPlay muted loop playsInline
        style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',objectPosition:'center center',zIndex:0}}>
        <source src="hero-bg.mp4" type="video/mp4"/>
      </video>

      {/* ── OVERLAY GRADIENT ── */}
      <div style={{
        position:'absolute',inset:0,zIndex:1,
        background:'linear-gradient(to bottom, rgba(4,8,24,.62) 0%, rgba(4,8,24,.38) 45%, rgba(4,8,24,.72) 100%)',
      }}/>

      {/* ── PARTICLES OVER VIDEO ── */}
      <StarsHero/>

  const stats=[

  return(

/* ══════════════════════════════════
   ROOT APP
══════════════════════════════════ */
function App(){
  const [phase,setPhase]=useState('landing');
  const [step,setStep]=useState(S.Q1);
  const [lead,setLead]=useState(INIT);
  const [loading,setLoading]=useState(false);
  const [sk,setSk]=useState(0);
  const [hist,setHist]=useState([]);
  const [showSticky,setShowSticky]=useState(false);
  const scrolled=useScrolled(500);
  useEffect(()=>{setShowSticky(scrolled&&phase==='landing');},[scrolled,phase]);

  const upd=u=>setLead(p=>({...p,...u}));

  const startFunnel=useCallback((pre=null)=>{
    if(pre) upd({lead_type:pre});
    window.scrollTo({top:0,behavior:'smooth'});
    setTimeout(()=>{
      if(pre==='private'){setStep(S.Q2);setHist([S.Q1]);}
      else if(pre==='company'){setStep(S.Q2);setHist([S.Q1]);setLead(p=>({...p,lead_type:'company'}));}
      else{setStep(S.Q1);setHist([]);}
      setSk(k=>k+1);setPhase('funnel');
    },pre?380:180);
  },[]);

  const go=useCallback((next,upd_)=>{
    if(upd_) upd(upd_);
    setHist(h=>[...h,step]);
    setTimeout(()=>{setStep(next);setSk(k=>k+1);},50);
  },[step]);

  const back=()=>{
    const p=hist[hist.length-1];
    if(!p){setPhase('landing');return;}
    setHist(h=>h.slice(0,-1));setStep(p);setSk(k=>k+1);
  };

  const subP=async fd=>{setLoading(true);const m={...lead,...fd};const r=await submitLead(m);setLead({...m,tags:r.tags,route_goal:r.route_goal,submitted_at:r.submitted_at});setLoading(false);setPhase('success');};
  const subC=async fd =>{setLoading(true);const m={...lead,...fd};const r=await submitLead(m);setLead({...m,tags:r.tags,route_goal:r.route_goal,submitted_at:r.submitted_at});setLoading(false);setPhase('success');};

  const getProg=()=>{
    const co=lead.lead_type==='company'||[S.CA,S.CB,S.CF].includes(step);
    return{current:PROG[step]||1,total:co?5:6};
  };

  const renderStep=()=>{
    switch(step){
      case S.Q1: return <QuestionStep question="Sind Sie Privatperson oder Firma?" subtitle="Wir stellen Ihnen die relevanten Angebote vor."
        options={[{value:'private',icon:'👤',label:'Privatperson',sublabel:'Tickets · Newsletter · Investitionsmöglichkeit'},{value:'company',icon:'🏢',label:'Firma',sublabel:'Events · Marketing · Partnerschaft · Investment'}]}
        onAnswer={v=>go(S.Q2,{lead_type:v})} selected={lead.lead_type}/>;

      case S.Q2: return <QuestionStep question="Waren Sie schon einmal bei DAS ZELT?" subtitle="Seit fast 25 Jahren bringt DAS ZELT die Schweiz zusammen."
        options={[{value:'yes',icon:'✅',label:'Ja, ich war bereits dabei',sublabel:'Ich kenne das Erlebnis'},{value:'no',icon:'🌟',label:'Nein, noch nicht',sublabel:'Ich entdecke DAS ZELT gerade'}]}
        onAnswer={v=>go(lead.lead_type==='private'?S.PA:S.CA,{has_visited:v})} selected={lead.has_visited}/>;

      case S.PA: return <QuestionStep question="Was interessiert Sie am meisten an DAS ZELT?" subtitle="Erzählen Sie uns mehr über Ihre Motivation."
        options={[{value:'kultur',icon:'🎭',label:'Schweizer Kultur live erleben',sublabel:'Theater, Comedy, Musik unter einem Dach'},{value:'vorteile',icon:'🥂',label:'Exklusive Vorteile sichern',sublabel:'Tickets, VIP-Zugang, besondere Erlebnisse'},{value:'unterstuetzen',icon:'💛',label:'Als Unterstützerin mitwirken',sublabel:'Teil der Erfolgsgeschichte werden'},{value:'newsletter',icon:'📬',label:'News und Highlights erhalten',sublabel:'Immer als Erste informiert sein'}]}
        onAnswer={v=>go(S.PB,{private_interest:v})} selected={lead.private_interest}/>;

      case S.PB: return <QuestionStep question="Können Sie sich vorstellen, sich mit Partizipationsscheinen an DAS ZELT zu beteiligen?" subtitle="Bereits ab CHF 1'000 erhalten Sie jährlich 2 Tickets — und werden Mitinhaber."
        options={[{value:'ja_infos',icon:'🚀',label:'Ja, ich möchte mehr erfahren',sublabel:'Ich bin grundsätzlich interessiert'},{value:'vielleicht',icon:'🤔',label:'Vielleicht — bitte Infos senden',sublabel:'Ich möchte erst die Details kennen'},{value:'newsletter_only',icon:'📖',label:'Im Moment eher Newsletter',sublabel:'Updates und Highlights reichen mir'}]}
        onAnswer={v=>go(S.PC,{investment_interest:v})} selected={lead.investment_interest}/>;

      case S.PC: return <QuestionStep question="Was ist Ihnen besonders wichtig?" subtitle="Damit wir Ihnen das Relevanteste zeigen können."
        options={[{value:'tickets',icon:'🎟️',label:'Tickets und exklusive Vorteile'},{value:'kultur',icon:'🇨🇭',label:'Kultur in der Schweiz unterstützen'},{value:'backstage',icon:'🎬',label:'Einblick hinter die Kulissen'},{value:'investment',icon:'💎',label:'Investment mit emotionalem Mehrwert'}]}
        onAnswer={v=>go(S.PF,{priority:v})} selected={lead.priority}/>;

      case S.PF: return <PrivateForm onSubmit={subP} loading={loading}/>;

      case S.CA: return <QuestionStep question="Für was interessieren Sie sich?" subtitle="Wir zeigen Ihnen die passenden Möglichkeiten."
        options={[{value:'marketingpakete',icon:'📢',label:'Marketingpakete',sublabel:'Sichtbarkeit und Reichweite bei DAS ZELT'},{value:'weihnachtsessen',icon:'🍽️',label:'Weihnachtsessen',sublabel:'Jahresend-Events für Teams und Kunden'},{value:'firmenanlaesse',icon:'🎪',label:'Firmenanlässe',sublabel:'Exklusive Events unter dem grossen Zelt'},{value:'sideevents',icon:'✨',label:'Side Events',sublabel:'Networking, Erlebnismarketing, Kundenanlässe'},{value:'crowdfunding',icon:'💼',label:'Crowdinvesting / Beteiligung',sublabel:'Als Unternehmen in Schweizer Kultur investieren'}]}
        onAnswer={v=>go(S.CB,{company_interest:v})} selected={lead.company_interest}/>;

      case S.CB: return <QuestionStep question="Was passt am besten zu Ihrem Anliegen?" subtitle="Damit wir die richtige Ansprechperson für Sie finden."
        options={[{value:'mitarbeitende',icon:'🙌',label:'Mitarbeitende begeistern'},{value:'kunden',icon:'🤝',label:'Kunden einladen'},{value:'marke',icon:'💡',label:'Marke sichtbar machen'},{value:'partnerschaft',icon:'🌟',label:'Exklusive Partnerschaft prüfen'},{value:'investment',icon:'📈',label:'Investmentmöglichkeit prüfen'}]}
        onAnswer={v=>go(S.CF,{company_goal:v})} selected={lead.company_goal}/>;

      case S.CF: return <CompanyForm onSubmit={subC} loading={loading}/>;
      default: return null;
    }
  };

  /* SUCCESS */
  if(phase==='success') return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'2rem 0',background:'radial-gradient(ellipse at center top,rgba(8,18,55,.4) 0%,#06070d 55%)',position:'relative',overflow:'hidden'}}>
      {useMemo(()=>Array.from({length:70},(_,i)=>({id:i,l:Math.random()*100,t:Math.random()*100,sz:Math.random()*1.8+.4,dur:(Math.random()*3+2).toFixed(1),del:(Math.random()*4).toFixed(1)})),[]).map(x=>(
        <div key={x.id} style={{position:'absolute',left:`${x.l}%`,top:`${x.t}%`,width:`${x.sz}px`,height:`${x.sz}px`,borderRadius:'50%',background:'rgba(255,255,255,.65)',animation:`twinkle ${x.dur}s ease-in-out ${x.del}s infinite`,pointerEvents:'none'}}/>
      ))}
      <div style={{position:'relative',zIndex:10,width:'100%'}}>
        <SuccessScreen lead={lead}/>
      </div>
    </div>
  );

  /* FUNNEL */
  if(phase==='funnel'){
    const{current,total}=getProg();
    return(
      <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',background:'radial-gradient(ellipse at 50% 0%,rgba(8,18,55,.38) 0%,#06070d 55%)',position:'relative',overflow:'hidden'}}>
        <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:0}}>
          {useMemo(()=>Array.from({length:90},(_,i)=>({id:i,l:Math.random()*100,t:Math.random()*100,sz:Math.random()*1.8+.4,dur:(Math.random()*3+2).toFixed(1),del:(Math.random()*5).toFixed(1)})),[]).map(x=>(
            <div key={x.id} style={{position:'absolute',left:`${x.l}%`,top:`${x.t}%`,width:`${x.sz}px`,height:`${x.sz}px`,borderRadius:'50%',background:'rgba(255,255,255,.55)',animation:`twinkle ${x.dur}s ease-in-out ${x.del}s infinite`}}/>
          ))}
        </div>
        <div style={{position:'relative',zIndex:10,maxWidth:'560px',margin:'0 auto',width:'100%',padding:'1.4rem 1.5rem .8rem',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div className="font-serif gold-shimmer" style={{fontSize:'1.3rem',fontWeight:700}}>DAS ZELT</div>
          <div style={{color:'rgba(255,255,255,.25)',fontSize:'.68rem',letterSpacing:'.18em',textTransform:'uppercase'}}>Exklusive Einladung</div>
        </div>
        <div style={{position:'relative',zIndex:10,paddingTop:'.6rem'}}><ProgressBar current={current} total={total}/></div>
        {hist.length>0&&(
          <div style={{position:'relative',zIndex:10,maxWidth:'560px',margin:'0 auto',width:'100%',padding:'0 1.5rem .5rem'}}>
            <BackButton onClick={back}/>
          </div>
        )}
        <div style={{position:'relative',zIndex:10,flex:1,display:'flex',alignItems:'flex-start',justifyContent:'center',paddingBottom:'5rem',paddingTop:'.5rem'}}>
          <div key={sk} style={{width:'100%'}}>{renderStep()}</div>
        </div>
        <div style={{position:'fixed',bottom:0,left:0,right:0,height:'5rem',background:'linear-gradient(transparent,rgba(6,7,13,.85))',pointerEvents:'none',zIndex:5}}/>
      </div>
    );
  }

  /* LANDING */
  return(
    <div style={{background:'#FDFAF5',minHeight:'100vh'}}>
      <StickyHeader onCTA={()=>startFunnel()}/>
      <HeroSection onCTA={()=>startFunnel()}/>
      <StatsBar/>
      <div className="section-divider"/>
      <WhatSection/>
      <div className="section-divider"/>
      <PhotoGallery/>
      <div className="section-divider"/>
      <ProgramSection/>
      <div className="section-divider"/>
      <TourSection/>
      <div className="section-divider"/>
      <InvestmentSection onCTA={()=>startFunnel('private')}/>
      <div className="section-divider"/>
      <AwardSection/>
      <div className="section-divider"/>
      <CompanySection onCTA={()=>startFunnel('company')}/>
      <div className="section-divider"/>
      <TeamSection/>
      <div className="section-divider"/>
      <FinalCTASection onPrivate={()=>startFunnel('private')} onCompany={()=>startFunnel('company')}/>
      <Footer/>
      <StickyCTA onCTA={()=>startFunnel()} visible={showSticky}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
